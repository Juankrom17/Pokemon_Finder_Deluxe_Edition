name: Compilar Pokefinder

on:
  push:
    branches:
      - develop
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pyinstaller pillow mss pytesseract

      - name: Compilar exe
        run: pyinstaller --onefile --windowed --name "Pokefinder" --icon=icono.ico Pokefinder.py

      - name: Subir artifact (develop)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Pokefinder-develop-build
          path: dist/Pokefinder.exe
          retention-days: 7

     # (Tus pasos anteriores donde instalas Python y ejecutas PyInstaller)
      
      - name: Crear Release y Subir el .exe
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') 
        with:
          files: dist/Pokemon_Finder.exe  # ⚠️ Reemplazá esto con la ruta exacta de tu .exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
