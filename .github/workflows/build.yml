name: 🔨 Compilar Pokefinder

on:
  # Se activa cuando hacés push a la rama develop (para probar)
  push:
    branches:
      - develop

  # Se activa cuando publicás una Release oficial
  release:
    types: [published]

jobs:
  build-windows:
    name: Compilar .exe en Windows
    runs-on: windows-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pyinstaller pillow mss pytesseract

      - name: 🔨 Compilar .exe
        run: |
          pyinstaller --onefile --windowed --name "Pokefinder" Pokefinder.py

      # Cuando hacés push a develop → sube el .exe como "artifact" descargable
      # (no es una release, solo para que vos lo pruebes)
      - name: 📎 Subir artifact (solo en develop)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Pokefinder-develop-build
          path: dist/Pokefinder.exe
          retention-days: 7

      # Cuando publicás una Release → sube el .exe directo a la release
      - name: 🚀 Subir .exe a la Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Pokefinder.exe
